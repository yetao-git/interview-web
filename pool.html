<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面试信息共享池</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/pool.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <header class="toolbar">
          <div class="toolbar-copy">
            <h1>面试信息共享池</h1>
          </div>
          <div class="toolbar-actions">
            <button id="my-records-button" type="button">个人记录</button>
            <button id="add-user-button" type="button" class="add-user-button">新增用户</button>
          </div>
        </header>
        <div class="search-bar">
          <input
            id="search-input"
            class="pool-search-input"
            type="text"
            placeholder="搜索公司名称..."
          />
          <button id="clear-search-button" type="button" class="clear-search-button">✕</button>
        </div>
        <div class="pool-stats" id="pool-stats"></div>
        <div class="table-shell">
          <table class="pool-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div class="pool-footer">
          <span id="record-count"></span>
        </div>
        <div id="pagination" class="pagination" aria-label="分页"></div>
      </section>
    </main>

    <!-- 密码输入模态框 -->
    <div id="password-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <h2>访问个人记录</h2>
        <p>请输入您的查看密码：</p>
        <input
          id="password-input"
          type="password"
          placeholder="输入密码..."
          class="modal-input"
        />
        <div id="password-error" class="modal-error" style="display: none;"></div>
        <div class="modal-actions">
          <button id="password-cancel" type="button" class="modal-button modal-button-cancel">取消</button>
          <button id="password-submit" type="button" class="modal-button modal-button-submit">确认</button>
        </div>
      </div>
    </div>

    <!-- 新增用户模态框 -->
    <div id="user-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <h2>新增用户</h2>
        <p>请输入用户信息：</p>
        <input
          id="user-name-input"
          type="text"
          placeholder="姓名..."
          class="modal-input"
          style="margin-bottom: 12px;"
        />
        <input
          id="user-password-input"
          type="password"
          placeholder="密码..."
          class="modal-input"
        />
        <div class="modal-tip">密码长度为6-15位字符</div>
        <div id="user-error" class="modal-error" style="display: none;"></div>
        <div class="modal-actions">
          <button id="user-cancel" type="button" class="modal-button modal-button-cancel">取消</button>
          <button id="user-submit" type="button" class="modal-button modal-button-submit">确认</button>
        </div>
      </div>
    </div>

    <script type="module" src="/pool.js"></script>
  </body>
</html>
